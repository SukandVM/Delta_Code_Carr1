<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level 1: The Independent Cursed Chart</title>
    <style>
        :root {
            --parchment: #f4e4bc;
            --ink: #2c1a0b;
            --blood: #8b0000;
            --seaweed: rgba(34, 139, 34, 0.6);
        }

        body {
            background-color: #1a120b;
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Papyrus', 'Georgia', serif;
            color: var(--ink);
            overflow: hidden;
        }

        /* --- CENTERED HEADING --- */
        .main-title {
            color: var(--parchment);
            text-align: center;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px #000;
            z-index: 2500;
            text-transform: uppercase;
        }

        #map-wrapper {
            position: relative;
            width: 70vh; height: 70vh;
            background: url('https://i.imgur.com/image_19be94.jpg') no-repeat center;
            background-size: 100% 100%;
            border: 15px solid #3d2b1f;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            z-index: 100;
        }

        #fog-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 120;
            pointer-events: none;
        }

        /* --- INDEPENDENT PUZZLE ELEMENTS --- */
        #pseudo-trap::after {
            content: "A"; 
            position: absolute; top: 20%; left: 20%;
            font-size: 60px; color: var(--blood);
            opacity: 0; /* PUZZLE A: Opacity -> 1 */
        }

        #seaweed-layer {
            position: absolute; bottom: 20%; left: 20%;
            width: 100px; height: 100px;
            background: var(--seaweed);
            z-index: 150;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            /* PUZZLE G: Delete this element */
        }

        #honeypot-veil {
            position: absolute; width: 100%; height: 100%;
            z-index: 200;
            background: rgba(139, 0, 0, 0.02); 
            /* PUZZLE O: Delete this element */
        }

        #treasure-x {
            position: absolute;
            color: var(--blood);
            font-size: 80px; font-weight: bold;
            opacity: 0; 
            z-index: 50;
            transform: translate(-50%, -50%);
            /* PUZZLE S: Opacity -> 1 */
        }

        #submit-btn {
            position: absolute;
            padding: 10px 20px;
            background: var(--ink);
            color: var(--parchment);
            border: 2px solid #8b4513;
            z-index: 5000;
            cursor: pointer;
            display: none; /* Only shown for Task L */
        }

        /* --- UI PANELS --- */
        .log-panel {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(44, 27, 14, 0.95);
            color: #e0c9a6; padding: 15px;
            border: 2px solid #8b4513; font-size: 1rem;
            width: 300px; z-index: 2000;
        }

        .status-msg {
            color: #00ff00; font-weight: bold; margin-top: 10px;
            text-align: center; border: 1px dashed #00ff00; padding: 5px;
        }

        .reset-btn {
            position: fixed; bottom: 10px; left: 10px;
            background: #444; color: #999; border: none; padding: 5px;
            cursor: pointer; font-size: 10px;
        }
    </style>
</head>
<body>

    <h1 class="main-title">The Cursed Chart</h1>

    <div id="map-wrapper">
        <div id="honeypot-veil"></div>
        <canvas id="fog-canvas"></canvas>
        <div id="pseudo-trap"></div>
        <div id="seaweed-layer"></div>
        <div id="treasure-x">X</div>

        <div class="log-panel">
            <b>📜 ASSIGNED TASK:</b>
            <div id="task-desc" style="margin: 10px 0; min-height: 50px; font-style: italic;">Loading...</div>
            
            <div style="border-top: 1px solid #555; padding-top: 5px;">
                <b>LOGGED KEYS:</b> [<span id="keys-logged" style="color: gold;">-</span>]
            </div>

            <div id="refresh-notice" class="status-msg" style="display:none;">
                KEY SECURED! REFRESH TO START NEXT HUNT.
            </div>
        </div>
    </div>

    <button id="submit-btn">CATCH KRAKEN</button>
    <button class="reset-btn" onclick="localStorage.clear(); location.reload();">RESET CONTEST</button>

<script>
    const allTasks = [
        { id: 'A', desc: "Find the Ghost in the Captain's Siren Shed." },
        { id: 'L', desc: "The Kraken button has surfaced. Catch it to claim the Key!" },
        { id: 'G', desc: "The 'seaweed-layer' hides the G. Scuttle the element in the DOM." },
        { id: 'O', desc: "The 'honeypot-veil' clouds your vision. Dissolve it to find O." },
        { id: 'S', desc: "Find the hidden 'treasure-x' and give it Sight (Opacity to 1)." }
    ];

    let foundKeys = JSON.parse(localStorage.getItem('foundKeys') || "[]");
    let activeTask = null;
    let sessionLocked = false;

    function init() {
        // Filter out found keys to pick a new independent task
        const availableTasks = allTasks.filter(t => !foundKeys.includes(t.id));
        
        if (availableTasks.length === 0) {
            document.getElementById('task-desc').innerHTML = "<b>ALL CURSES LIFTED!</b><br>FINAL CODE: <span style='color:red'>ALGOS</span>";
        } else {
            // Pick one random independent task for this session
            activeTask = availableTasks[Math.floor(Math.random() * availableTasks.length)];
            document.getElementById('task-desc').innerText = activeTask.desc;
            
            if (activeTask.id === 'L') setupKraken();
        }

        document.getElementById('keys-logged').innerText = foundKeys.length ? foundKeys.join(", ") : "NONE";
        
        setupFog();
        setupX();
        startObserver();
    }

    function setupFog() {
        const canvas = document.getElementById('fog-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'destination-out';
    }

    function setupX() {
        const xMark = document.getElementById('treasure-x');
        xMark.style.left = (Math.random() * 70 + 15) + "%";
        xMark.style.top = (Math.random() * 70 + 15) + "%";
    }

    function setupKraken() {
        const btn = document.getElementById('submit-btn');
        btn.style.display = 'block';
        setInterval(() => {
            if (sessionLocked) return;
            btn.style.left = Math.random() * 80 + 'vw';
            btn.style.top = Math.random() * 80 + 'vh';
        }, 250);
        btn.onclick = () => { if(!sessionLocked) completeTask('L'); };
    }

    function startObserver() {
        setInterval(() => {
            if (sessionLocked || !activeTask) return;

            let solved = false;
            switch(activeTask.id) {
                case 'A':
                    const opA = window.getComputedStyle(document.getElementById('pseudo-trap'), '::after').getPropertyValue('opacity');
                    if (parseFloat(opA) >= 1) solved = true;
                    break;
                case 'G':
                    if (!document.getElementById('seaweed-layer')) solved = true;
                    break;
                case 'O':
                    if (!document.getElementById('honeypot-veil')) solved = true;
                    break;
                case 'S':
                    const opS = window.getComputedStyle(document.getElementById('treasure-x')).getPropertyValue('opacity');
                    if (parseFloat(opS) >= 1) solved = true;
                    break;
            }
            if (solved) completeTask(activeTask.id);
        }, 1000);
    }

    function completeTask(id) {
        sessionLocked = true;
        foundKeys.push(id);
        localStorage.setItem('foundKeys', JSON.stringify(foundKeys));
        document.getElementById('refresh-notice').style.display = 'block';
        alert(`Key ${id} Salvaged!`);
    }

    window.onload = init;
</script>
</body>
</html>
